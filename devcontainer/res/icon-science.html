  body {
    padding: 0;
    margin: 0;

    display: grid;
    grid-template-columns: 14vmin repeat(2, 1fr);

    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen-Sans, Ubuntu,
      Cantarell, "Helvetica Neue", sans-serif;

    .color {
      display: grid;
      grid-template-columns: subgrid;
      grid-column: 1/4;
      gap: 1vmin;

      transition: opacity 1s;

      &.hidden {
        opacity: 0.2;
      }

      .sample {
        display: flex;
        min-height: 7vmin;
        min-width: 7vmin;

        text-align: center;
        align-items: center;
        justify-content: center;

        font-size: 1vmin;
        line-height: 1vmin;
        color: transparent;
        text-shadow: 0 1vmin 0 white, 0 -1vmin 0 black;
      }

      .info {
        display: grid;
        grid-template-columns: subgrid;
        grid-column: 2/4;

        font-size: 1vmin;
        line-height: 1vmin;

        :nth-child(odd) {
          text-transform: capitalize;
        }
      }
    }
  }
</style>
