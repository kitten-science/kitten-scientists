name: Manage Labels

on:
  push:
    branches:
      - main
    paths:
      - .github/labels.yml
  workflow_dispatch:

concurrency: manage-labels

jobs:
  manage-labels:
    permissions:
      contents: read
      issues: write
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: oliversalzburg/action-label-manager@85d57d573bcf29a9978611ba2ca4ac1c1d19eaae # v3.0.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
